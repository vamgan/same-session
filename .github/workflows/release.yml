name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Verify tag version
        shell: bash
        run: |
          version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "samesession") | .version')"
          test "v${version}" = "${GITHUB_REF_NAME}"
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} -p samesession
      - name: Create archive
        shell: bash
        run: |
          suffix=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then suffix=".exe"; fi
          archive="samesession-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "${archive}" \
            -C "target/${{ matrix.target }}/release" "samesession${suffix}" \
            -C "$GITHUB_WORKSPACE" README.md LICENSE-MIT
      - uses: actions/upload-artifact@v4
        with:
          name: samesession-${{ matrix.target }}
          path: samesession-*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: samesession-*
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/* --repo "${GITHUB_REPOSITORY}" --generate-notes --verify-tag
