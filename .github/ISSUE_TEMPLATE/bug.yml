name: Bug report
description: Report incorrect or unsafe SameSession behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach real transcripts, credentials, or secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SameSession version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Sanitized reproduction
    validations:
      required: true

